<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lizard RP - Sunucuya Bağlan</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0f;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .card {
            background: #13131a;
            border: 1px solid #2a2a3a;
            border-radius: 16px;
            padding: 48px 56px;
            text-align: center;
            max-width: 460px;
            width: 90%;
            box-shadow: 0 0 60px rgba(99, 102, 241, 0.15);
        }

        .logo {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 2px;
            color: #fff;
            margin-bottom: 6px;
        }

        .logo span {
            color: #6366f1;
        }

        .subtitle {
            color: #555;
            font-size: 13px;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 36px;
        }

        .info {
            background: #0d0d14;
            border: 1px solid #1e1e2e;
            border-radius: 8px;
            padding: 14px 20px;
            margin-bottom: 28px;
            font-size: 13px;
            color: #888;
        }

        .info span {
            color: #aaa;
            font-family: monospace;
            font-size: 14px;
        }

        .btn {
            display: inline-block;
            background: #6366f1;
            color: #fff;
            text-decoration: none;
            padding: 14px 40px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: background 0.2s, transform 0.1s;
            width: 100%;
        }

        .btn:hover {
            background: #4f46e5;
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .note {
            margin-top: 20px;
            font-size: 12px;
            color: #444;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">LIZARD<span>RP</span></div>
        <div class="subtitle">Garry's Mod Roleplay</div>

        <div class="info">
            IP: <span>92.222.203.131:27015</span>
        </div>

        <a href="steam://connect/92.222.203.131:27015" class="btn">
            Sunucuya Bağlan
        </a>

        <div class="note">Steam yüklü olmalıdır. Garry's Mod açık olmak zorunda değil.</div>
    </div>
</body>
</html>
